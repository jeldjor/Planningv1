<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Planning Mobile v3.0</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--primary:#315f9f;--primary-dark:#254b7e;--gold:#ffb547;--bg:#f6f7f9;--panel:#fff;--text:#182230;--muted:#667085;--line:#e5e7eb;--soft:#eef4fb;--shadow:0 8px 22px rgba(16,24,40,.08)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:15px;padding-bottom:env(safe-area-inset-bottom)}
.splash{position:fixed;inset:0;background:var(--primary);display:grid;place-items:center;z-index:99;color:white;transition:.35s}.splash.hide{opacity:0;pointer-events:none}.splashCard{text-align:center}.splash small{display:block;margin-bottom:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.9}.logoBox{background:#fff;border-radius:20px;padding:14px;width:154px;margin:auto;box-shadow:0 18px 45px rgba(0,0,0,.25)}.logoBox img{display:block;width:100%;height:auto}
.header{position:sticky;top:0;z-index:20;background:var(--primary);padding:10px 12px calc(10px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(16,24,40,.16)}.headLogo{background:white;border-radius:12px;padding:5px;width:55px;height:42px;display:grid;place-items:center}.headLogo img{max-width:100%;max-height:100%}.menuBtn{background:transparent;color:var(--gold)!important;border:2px solid rgba(255,181,71,.75);border-radius:999px;padding:9px 13px;font-weight:950;letter-spacing:.03em}
.menuPanel{position:fixed;right:10px;top:68px;z-index:40;background:rgba(17,25,40,.97);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:8px;width:min(250px,calc(100vw - 20px));box-shadow:0 24px 80px rgba(0,0,0,.35);display:none}.menuPanel.open{display:block}.menuPanel button{width:100%;background:transparent!important;color:white!important;text-align:left;padding:13px 12px;border-radius:12px}.menuPanel button.active{background:rgba(255,255,255,.11)!important}.menuPanel .version{color:rgba(255,255,255,.65);font-size:12px;text-align:center;padding:8px 0 3px}
main{padding:12px}.screen{display:none}.screen.active{display:block}.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}h1{font-size:22px;margin:4px 0 4px}h2{font-size:18px;margin:0 0 10px}.muted{color:var(--muted);font-size:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px}.stat strong{display:block;font-size:19px}button{border:0;border-radius:13px;background:var(--primary);color:white!important;font-weight:900;padding:11px 12px;cursor:pointer}button.secondary{background:var(--soft)!important;color:var(--primary-dark)!important;border:1px solid #d9e6f4}button.ghost{background:#fff!important;color:var(--primary-dark)!important;border:1px solid var(--line)}input,select,textarea{width:100%;height:46px;border:1px solid #d5dbe7;border-radius:13px;padding:10px 11px;background:#fff;color:var(--text);font:inherit}textarea{height:74px;resize:vertical}input::placeholder,textarea::placeholder{color:#9aa4b2}label{display:grid;gap:5px;font-size:12px;font-weight:850;color:#374151}.form{display:grid;gap:9px}.formRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.visitCard{border-left:5px solid var(--primary);padding:12px}.visitTop{display:flex;justify-content:space-between;gap:10px}.visitTop strong{font-size:16px}.btnRow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.dayItem{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}.dayItem:last-child{border-bottom:0}.settingsVersion{text-align:center;color:var(--muted);font-size:12px;margin-top:14px}.themeGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.themeChoice{height:42px;border-radius:12px;border:2px solid transparent}.themeChoice.active{outline:3px solid rgba(255,181,71,.55)}.blue{background:#315f9f}.green{background:#208250}.purple{background:#6d3bc2}.orange{background:#f97316}.red{background:#c03434}.empty{color:#98a2b3;text-align:center;padding:20px 10px}.pill{display:inline-flex;background:#f1f5f9;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:850}
@media(min-width:761px){body:before{content:'Open deze mobiele versie op iPhone. Op laptop wordt normaal laptop.html gebruikt.';display:block;padding:10px;text-align:center;background:#fff7ed;color:#92400e;font-weight:800}}
</style>
</head>
<body>
<div id="splash" class="splash"><div class="splashCard"><small>Powered by</small><div class="logoBox"><img src="logo.png" alt="Logo"></div></div></div>
<header class="header"><div class="headLogo"><img src="logo.png" alt="Logo"></div><button id="menuBtn" class="menuBtn">MENU</button></header>
<nav id="menuPanel" class="menuPanel">
 <button data-screen="today" class="active">👁️ Vandaag</button>
 <button data-screen="calendar">Kalender</button>
 <button data-screen="overview">Overzicht</button>
 <button data-screen="absence">Afwezigheid</button>
 <button data-screen="settings">Instellingen</button>
 <div class="version">v3.0 mobile</div>
</nav>
<main>
<section id="today" class="screen active"><h1>Vandaag</h1><p class="muted" id="todayDate"></p><div class="panel"><div class="grid2"><label>Vertrektijd<input id="depart" type="time" value="08:00" placeholder="Bijv. 08:00"></label><label>Route-app<select id="navApp"><option>Waze</option><option>Google Maps</option><option>Apple Kaarten</option></select></label></div><div class="stats" style="margin-top:10px"><div class="stat"><strong id="statVisits">0</strong><span>klanten</span></div><div class="stat"><strong id="statKm">–</strong><span>km</span></div><div class="stat"><strong id="statDone">0</strong><span>klaar</span></div></div></div><div id="todayRoute"></div></section>
<section id="calendar" class="screen"><h1>Kalender</h1><p class="muted">Alleen bekijken.</p><div class="panel"><div class="grid2"><button id="prevWeek" class="secondary">Vorige</button><button id="nextWeek" class="secondary">Volgende</button></div><div id="calendarList" style="margin-top:8px"></div></div></section>
<section id="overview" class="screen"><h1>Overzicht</h1><label>Zoeken<input id="search" placeholder="Bijv. Scapino, Middelburg of postcode"></label><div id="overviewList" style="margin-top:10px"></div></section>
<section id="absence" class="screen"><h1>Afwezigheid</h1><div class="panel"><div class="form"><label>Type<select id="blockType"><option>Verlof</option><option>Ziekte</option><option>Training</option><option>Overig</option></select></label><div class="formRow"><label>Startdatum<input id="blockStart" type="date" placeholder="Bijv. 2026-07-05"></label><label>Einddatum<input id="blockEnd" type="date" placeholder="Bijv. 2026-07-05"></label></div><div class="formRow"><label>Starttijd<input id="blockStartTime" type="time" placeholder="Bijv. 09:00"></label><label>Eindtijd<input id="blockEndTime" type="time" placeholder="Bijv. 12:30"></label></div><label>Omschrijving<textarea id="blockNote" placeholder="Bijv. tandarts, verlof ochtend of training"></textarea></label><button id="saveBlock">Opslaan</button></div></div><div id="absenceList"></div></section>
<section id="settings" class="screen"><h1>Instellingen</h1><div class="panel form"><label>Taal<select id="lang"><option value="nl">Nederlands</option><option value="de">Deutsch</option><option value="en">English</option></select></label><label>Kleurmodus</label><div class="themeGrid"><button class="themeChoice blue" data-theme="blue" title="Blauw"></button><button class="themeChoice green" data-theme="green" title="Groen"></button><button class="themeChoice purple" data-theme="purple" title="Paars"></button><button class="themeChoice orange" data-theme="orange" title="Oranje"></button><button class="themeChoice red" data-theme="red" title="Rood"></button></div><label style="display:flex;grid-template-columns:auto 1fr;align-items:center;gap:8px"><input id="defaultSettings" type="checkbox" style="width:auto;height:auto"> Als standaard gebruiken</label><button id="saveSettings">Instellingen opslaan</button><div class="settingsVersion">Versie: v3.0 mobile<br>Supabase: nog niet gekoppeld</div></div></section>
</main>
<script>
const VERSION='v3.0';
const COLORS={blue:['#315f9f','#254b7e','#eef4fb'],green:['#208250','#166534','#edf7f1'],purple:['#6d3bc2','#552b9a','#f5f3ff'],orange:['#f97316','#c2410c','#fff7ed'],red:['#c03434','#991b1b','#fbefef']};
const $=id=>document.getElementById(id); const todayIso=()=>new Date().toISOString().slice(0,10);
function loadDb(){try{return JSON.parse(localStorage.getItem('bp_pro_v2')||'{}')}catch(e){return {}}}
function saveDb(db){localStorage.setItem('bp_pro_v2',JSON.stringify(db||{}))}
let db=loadDb(); db.customers=db.customers||[]; db.visits=db.visits||[]; db.blocks=db.blocks||[]; db.history=db.history||[]; db.settings=db.settings||{};
function applyTheme(t){t=t||localStorage.getItem('gj_theme')||db.settings.theme||'blue'; const c=COLORS[t]||COLORS.blue; document.documentElement.style.setProperty('--primary',c[0]);document.documentElement.style.setProperty('--primary-dark',c[1]);document.documentElement.style.setProperty('--soft',c[2]);document.querySelectorAll('.themeChoice').forEach(b=>b.classList.toggle('active',b.dataset.theme===t)); localStorage.setItem('gj_theme',t); db.settings.theme=t;}
function cById(id){return db.customers.find(c=>String(c.ID||c.id||'')===String(id))||{}}
function visitDate(v){return v.date||v.datum||v.Datum||''} function visitStatus(v){return v.status||v.Status||'Gepland'}
function render(){db=loadDb(); db.customers=db.customers||[]; db.visits=db.visits||[]; db.blocks=db.blocks||[]; db.history=db.history||[]; db.settings=db.settings||{}; applyTheme(localStorage.getItem('gj_theme')||db.settings.theme||'blue'); $('todayDate').textContent=new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'}); renderToday(); renderCalendar(); renderOverview(); renderAbsence();}
function renderToday(){const d=todayIso(); const vs=db.visits.filter(v=>visitDate(v)===d && visitStatus(v)!=='Uit planning').sort((a,b)=>(a.order||0)-(b.order||0)); $('statVisits').textContent=vs.length; $('statDone').textContent=vs.filter(v=>['Bezocht','Uitgevoerd'].includes(visitStatus(v))).length; $('statKm').textContent=db.routeStats&&db.routeStats[d]?Math.round(db.routeStats[d].km||0):'–'; $('todayRoute').innerHTML=vs.length?vs.map(v=>visitCard(v)).join(''):'<div class="card empty">Geen route voor vandaag.</div>';}
function visitCard(v){const c=cById(v.customerId); const name=c.Winkel||v.customerName||'Klant'; const place=c.Plaats||''; const address=[c.Straat,c.Huisnr,c.Postcode].filter(Boolean).join(' '); const time=v.time||v.starttijd||''; const q=encodeURIComponent([address,place].filter(Boolean).join(' ')); return `<div class="card visitCard"><div class="visitTop"><strong>${name}</strong><span class="pill">${time||'tijd onbekend'}</span></div><div class="muted">${place}</div><div>${address||''}</div><div class="btnRow"><button onclick="openNav('${q}')">Route</button><button class="secondary" onclick="finishVisit('${v.id}')">Afronden</button></div><details style="margin-top:10px"><summary><b>Details / samenvatting</b></summary><div class="form" style="margin-top:10px"><input placeholder="Activiteit, bijv. displays controleren"><textarea placeholder="Samenvatting van bezoek"></textarea><input type="file" accept="image/*" capture="environment"><button onclick="finishVisit('${v.id}')">Opslaan</button></div></details></div>`}
function openNav(q){const app=$('navApp').value; let url=`https://www.google.com/maps/search/?api=1&query=${q}`; if(app==='Waze')url=`https://waze.com/ul?q=${q}&navigate=yes`; if(app==='Apple Kaarten')url=`http://maps.apple.com/?q=${q}`; location.href=url;}
function finishVisit(id){const v=db.visits.find(x=>x.id===id); if(v){v.status='Bezocht'; v.completedAt=new Date().toISOString(); saveDb(db); render(); alert('Bezoek opgeslagen.');}}
let weekOffset=0; function addDays(n){const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10)}
function renderCalendar(){let html=''; for(let i=0;i<7;i++){const d=addDays(weekOffset*7+i); const n=db.visits.filter(v=>visitDate(v)===d&&visitStatus(v)!=='Uit planning').length; html+=`<div class="dayItem"><div><strong>${new Date(d).toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})}</strong><br><span class="muted">${n} klanten</span></div><span class="pill">bekijken</span></div>`} $('calendarList').innerHTML=html;}
function renderOverview(){const q=($('search')?.value||'').toLowerCase(); const rows=db.customers.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q)).slice(0,80); $('overviewList').innerHTML=rows.length?rows.map(c=>`<div class="card"><strong>${c.Winkel||c.naam||'Klant'}</strong><div class="muted">${c.Plaats||''} ${c.Postcode||''}</div><div>${[c.Straat,c.Huisnr].filter(Boolean).join(' ')}</div></div>`).join(''):'<div class="card empty">Geen klanten gevonden.</div>';}
function renderAbsence(){const blocks=(db.blocks||[]).slice().sort((a,b)=>(b.start||'').localeCompare(a.start||'')).slice(0,20); $('absenceList').innerHTML=blocks.length?blocks.map(b=>`<div class="card"><strong>${b.type||'Afwezigheid'}</strong><div>${b.start||''}${b.end&&b.end!==b.start?' t/m '+b.end:''}</div><div class="muted">${[b.startTime,b.endTime].filter(Boolean).join(' - ')}</div><div>${b.note||''}</div></div>`).join(''):'<div class="card empty">Nog geen afwezigheid.</div>';}
$('menuBtn').onclick=()=>$('menuPanel').classList.toggle('open'); document.querySelectorAll('[data-screen]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(b.dataset.screen).classList.add('active'); document.querySelectorAll('#menuPanel button').forEach(x=>{x.classList.remove('active'); x.textContent=x.textContent.replace('👁️ ','')}); b.classList.add('active'); b.textContent='👁️ '+b.textContent.replace('👁️ ',''); $('menuPanel').classList.remove('open');});
$('prevWeek').onclick=()=>{weekOffset--;renderCalendar()}; $('nextWeek').onclick=()=>{weekOffset++;renderCalendar()}; $('search').oninput=renderOverview; document.querySelectorAll('.themeChoice').forEach(b=>b.onclick=()=>applyTheme(b.dataset.theme)); $('saveSettings').onclick=()=>{db.settings=db.settings||{}; db.settings.language=$('lang').value; if($('defaultSettings').checked){localStorage.setItem('gj_app_language',$('lang').value); localStorage.setItem('gj_theme',db.settings.theme||'blue')} saveDb(db); alert('Instellingen opgeslagen.')}; $('saveBlock').onclick=()=>{if(!$('blockStart').value)return alert('Vul startdatum in.'); db.blocks=db.blocks||[]; db.blocks.push({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),type:$('blockType').value,start:$('blockStart').value,end:$('blockEnd').value||$('blockStart').value,startTime:$('blockStartTime').value,endTime:$('blockEndTime').value,note:$('blockNote').value}); saveDb(db); render();};
window.addEventListener('load',()=>{applyTheme(); render(); setTimeout(()=>$('splash').classList.add('hide'),850)});
</script>
</body></html>
