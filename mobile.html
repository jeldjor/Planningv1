<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GJ Systems Mobile v5.1</title>
<style>
:root{--primary:#315f9f;--primary-dark:#254b7e;--soft:#eef4fb;--gold:#ffb547;--bg:#f6f7f9;--panel:#fff;--text:#182230;--muted:#667085;--line:#e5e7eb;--green:#16a34a;--green-bg:#eaf8ef;--orange:#f97316;--orange-bg:#fff7ed;--red:#b42318;--shadow:0 8px 22px rgba(16,24,40,.08)}
*{box-sizing:border-box}
html,body{margin:0;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}
body{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
button,input,select,textarea{font:inherit}
button{border:0;border-radius:11px;background:var(--primary);color:#fff!important;font-weight:900;min-height:38px;padding:8px 10px;cursor:pointer;touch-action:manipulation}
button.secondary{background:var(--soft)!important;color:var(--primary-dark)!important;border:1px solid #d9e6f4}
button.ghost{background:#fff!important;color:var(--primary-dark)!important;border:1px solid var(--line)}
button.orange{background:var(--orange)!important;color:white!important}
button.red{background:#fbefef!important;color:var(--red)!important;border:1px solid #f5b7b7}
input,select,textarea{width:100%;min-width:0;border:1px solid #d5dbe7;border-radius:10px;background:#fff;color:var(--text);height:38px;padding:7px 8px}
textarea{height:150px;min-height:150px;resize:vertical;line-height:1.35}
input::placeholder,textarea::placeholder{color:#98a2b3;opacity:1}
label{display:grid;gap:3px;font-size:11px;font-weight:850;color:#374151;min-width:0}
.splash{position:fixed;inset:0;background:var(--primary);z-index:100;display:grid;place-items:center;color:#fff;transition:opacity .25s ease}
.splash.hide{opacity:0;pointer-events:none}
.splash small{display:block;text-align:center;margin-bottom:10px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.logoBox{width:132px;background:#fff;border-radius:17px;padding:12px;box-shadow:0 18px 45px rgba(0,0,0,.25)}
.logoBox img{display:block;width:100%;height:auto}
.header{position:sticky;top:0;z-index:30;min-height:54px;background:var(--primary);display:flex;align-items:center;justify-content:space-between;padding:8px 10px calc(8px + env(safe-area-inset-top));box-shadow:0 8px 24px rgba(16,24,40,.16)}
.headLogo{width:48px;height:36px;background:white;border-radius:10px;padding:4px;display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.14)}
.headLogo img{max-width:100%;max-height:100%}
.menuBtn{background:rgba(0,0,0,.12)!important;color:var(--gold)!important;border:1px solid var(--gold);border-radius:999px;min-height:34px;padding:7px 12px}
.menuPanel{position:fixed;right:8px;top:58px;z-index:60;width:min(218px,calc(100vw - 16px));display:none;background:rgba(15,23,42,.98);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:6px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.menuPanel.open{display:block}.menuPanel button{width:100%;background:transparent!important;color:#fff!important;text-align:left;border-radius:10px;min-height:38px;padding:9px 10px}.menuPanel button.active{background:rgba(255,255,255,.14)!important}.menuPanel .version{text-align:center;color:rgba(255,255,255,.65);font-size:11px;padding:7px 0 2px}
main{width:100%;max-width:430px;margin:0 auto;padding:8px}
.screen{display:none}.screen.active{display:block}
h1{font-size:20px;line-height:1.1;margin:2px 0 3px}h2{font-size:16px;margin:0 0 7px}.muted{color:var(--muted);font-size:12px;line-height:1.25}
.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:10px;margin-bottom:8px;overflow:hidden}
.grid2{display:flex;gap:7px;align-items:flex-end}.grid2>*{flex:1 1 0;min-width:0}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:8px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:7px 4px;text-align:center;min-width:0}.stat strong{display:block;font-size:15px;line-height:1.05}.stat span{display:block;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg{display:flex;align-items:center;gap:7px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:7px 8px;margin:6px 0;font-size:12px;font-weight:850;color:#334155}.leg.walk{background:#ecfdf3;color:#166534;border-color:#bbf7d0}.leg.home,.leg.pause{background:#fff7ed;color:#92400e;border-color:#fed7aa}.leg.pause{border-style:dashed}.leg.disabled{opacity:.45;text-decoration:line-through}
.visitCard{border-left:4px solid var(--primary);padding:9px}.visitCard.done{border-left-color:var(--green);background:var(--green-bg);border-color:#9bd5ad}.visitCard.notdone{border-left-color:var(--orange);background:var(--orange-bg);border-color:#fdba74}.visitCard.out{opacity:.55;border-left-color:#94a3b8;background:#f8fafc}
.visitTop{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:start}.visitTop strong{font-size:15px;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pill{display:inline-flex;align-items:center;background:#f1f5f9;border-radius:999px;padding:4px 7px;font-size:11px;font-weight:850;white-space:nowrap}
.routeMode{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 7px;font-size:11px;font-weight:900;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;white-space:nowrap}.routeMode.walk{background:#ecfdf3;color:#166534;border-color:#bbf7d0}
.btnRow{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.smallBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}.smallBtns button{min-height:32px;padding:6px 5px;font-size:12px}
.savedLine{margin-top:7px;padding:7px 8px;border-radius:10px;background:#dcfce7;color:#166534;font-weight:950;font-size:12px}.visitCard.notdone .savedLine{background:#ffedd5;color:#c2410c}
.timeLine{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:6px 0}.timeEdit{display:grid;grid-template-columns:1fr 1fr auto;gap:5px;margin:6px 0}.timeEdit input{height:34px}.eyeBtn,.saveTimeBtn{min-height:30px!important;padding:5px 8px!important;border-radius:8px!important}
.form{display:grid;gap:7px}.formRow{display:flex;gap:7px}.formRow>*{flex:1 1 0;min-width:0}
.finishOverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:90;display:none;align-items:flex-end;justify-content:center;padding:10px}.finishOverlay.open{display:flex}.finishSheet{width:min(430px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:20px 20px 16px 16px;padding:12px;box-shadow:0 24px 80px rgba(0,0,0,.35)}.finishHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.finishClose{background:#f1f5f9!important;color:#334155!important;min-height:30px!important;padding:5px 9px!important}.photoBox{border:1px dashed #cbd5e1;border-radius:12px;background:#f8fafc;padding:9px;display:grid;gap:7px}.photoList{display:flex;flex-wrap:wrap;gap:5px}.photoTag{background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 7px;font-size:11px;color:#475467}.finishActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.dayItem{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}.dayItem:last-child{border-bottom:0}.dayItem.clickable{cursor:pointer}
.empty{color:#98a2b3;text-align:center;padding:14px 8px;font-size:13px}
.themeGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.themeChoice{height:32px;min-height:32px;border-radius:9px;border:2px solid transparent;padding:0}.themeChoice.active{outline:3px solid rgba(255,181,71,.55)}.blue{background:#315f9f}.green{background:#208250}.purple{background:#6d3bc2}.orangeTheme{background:#f97316}.red{background:#c03434}.settingsVersion{text-align:center;color:var(--muted);font-size:12px;margin-top:10px}
@media(max-width:350px){.grid2,.formRow{flex-direction:column;align-items:stretch}.stats{grid-template-columns:repeat(2,1fr)}.btnRow,.smallBtns{grid-template-columns:1fr}main{padding:7px}}
</style>
<script>setTimeout(()=>{const s=document.getElementById('splash');if(s)s.classList.add('hide')},2200);window.addEventListener('error',()=>setTimeout(()=>{const s=document.getElementById('splash');if(s)s.classList.add('hide')},300));</script>
</head>
<body>
<div id="splash" class="splash"><div><small>Powered by</small><div class="logoBox"><img src="logo.png" alt="Logo"></div></div></div>
<header class="header"><div class="headLogo"><img src="logo.png" alt="Logo"></div><button id="menuBtn" class="menuBtn" type="button">MENU</button></header>
<nav id="menuPanel" class="menuPanel">
<button type="button" data-screen="today" class="active">👁️ Vandaag</button><button type="button" data-screen="calendar">Kalender</button><button type="button" data-screen="overview">Overzicht</button><button type="button" data-screen="absence">Afwezigheid</button><button type="button" data-screen="settings">Instellingen</button><div class="version">v5.1 mobile</div>
</nav>
<main>
<section id="today" class="screen active"><h1>Vandaag</h1><p class="muted" id="todayDate"></p><div class="panel"><div class="grid2"><label>Vertrektijd<input id="depart" type="time" value="08:00"></label><label>Route-app<select id="navApp"><option>Waze</option><option>Google Maps</option><option>Apple Kaarten</option></select></label></div><div class="stats"><div class="stat"><strong id="statVisits">0</strong><span>klanten</span></div><div class="stat"><strong id="statKm">–</strong><span>km</span></div><div class="stat"><strong id="statTravel">–</strong><span>reistijd</span></div><div class="stat"><strong id="statDone">0</strong><span>klaar</span></div></div><button id="fullRouteBtn" type="button" style="width:100%;margin-top:8px">🚗 Volledige route openen</button><div class="smallBtns"><button id="togglePause" type="button" class="secondary">☕ Pauze aan/uit</button><button id="recalcBtn" type="button" class="secondary">↻ Herbereken</button><button id="resetDemo" type="button" class="secondary">Demo reset</button><button id="sortTime" type="button" class="secondary">Tijd sort</button></div></div><div id="todayRoute"></div></section>
<section id="calendar" class="screen"><h1>Kalender</h1><p class="muted">Klik op een dag voor kort overzicht.</p><div class="panel"><div class="grid2"><button id="prevWeek" class="secondary" type="button">Vorige</button><button id="nextWeek" class="secondary" type="button">Volgende</button></div><div id="calendarList" style="margin-top:8px"></div></div><div id="calendarDetail"></div></section>
<section id="overview" class="screen"><h1>Overzicht</h1><label>Zoeken<input id="search" placeholder="Zoek klant, plaats of postcode"></label><div id="overviewList" style="margin-top:10px"></div></section>
<section id="absence" class="screen"><h1>Afwezigheid</h1><div class="panel"><div class="form"><label>Type<select id="blockType"><option>Verlof</option><option>Ziekte</option><option>Training</option><option>Overig</option></select></label><div class="formRow"><label>Startdatum<input id="blockStart" type="date"></label><label>Einddatum<input id="blockEnd" type="date"></label></div><div class="formRow"><label>Starttijd<input id="blockStartTime" type="time" placeholder="09:00"></label><label>Eindtijd<input id="blockEndTime" type="time" placeholder="12:30"></label></div><label>Omschrijving<textarea id="blockNote" placeholder="Bijv. tandarts, verlof ochtend of training"></textarea></label><button id="saveBlock" type="button">Opslaan</button></div></div><div id="absenceList"></div></section>
<section id="settings" class="screen"><h1>Instellingen</h1><div class="panel form"><label>Taal<select id="lang"><option value="nl">Nederlands</option><option value="de">Deutsch</option><option value="en">English</option></select></label><label>Kleurmodus</label><div class="themeGrid"><button type="button" class="themeChoice blue" data-theme="blue"></button><button type="button" class="themeChoice green" data-theme="green"></button><button type="button" class="themeChoice purple" data-theme="purple"></button><button type="button" class="themeChoice orangeTheme" data-theme="orange"></button><button type="button" class="themeChoice red" data-theme="red"></button></div><label style="display:flex;grid-template-columns:auto 1fr;align-items:center;gap:8px"><input id="defaultSettings" type="checkbox" style="width:auto;height:auto"> Als standaard gebruiken</label><button id="saveSettings" type="button">Instellingen opslaan</button><div class="settingsVersion">Versie: v5.1 mobile<br>Supabase: nog niet gekoppeld</div></div></section>
<div id="finishOverlay" class="finishOverlay"><div class="finishSheet"><div class="finishHead"><div><strong id="finishTitle">Klant afronden</strong><div id="finishMeta" class="muted"></div></div><button id="finishClose" class="finishClose" type="button">Sluit</button></div><div class="form"><label>Activiteit<input id="finishActivity" placeholder="Bijv. winkelcheck, schapcontrole"></label><label>Samenvatting<textarea id="finishSummary" placeholder="Typ hier uitgebreid wat er is gedaan, bijzonderheden, afspraken of opmerkingen..."></textarea></label><div class="photoBox"><strong>Foto's</strong><input id="finishPhotos" type="file" accept="image/*" capture="environment" multiple><div id="existingPhotos" class="photoList"></div><span id="photoHelp" class="muted">Voeg foto’s toe van deze klant/uitvoering.</span></div><div class="finishActions"><button id="btnDone" type="button">Uitgevoerd</button><button id="btnNotDone" class="orange" type="button">Niet uitgevoerd</button></div></div></div></div>
</main>
<script>
(function(){
const VERSION='v5.1',STORAGE='gj_mobile_v51_data';
const COLORS={blue:['#315f9f','#254b7e','#eef4fb'],green:['#208250','#166534','#edf7f1'],purple:['#6d3bc2','#552b9a','#f5f3ff'],orange:['#f97316','#c2410c','#fff7ed'],red:['#c03434','#991b1b','#fbefef']};
const $=id=>document.getElementById(id); const todayIso=()=>new Date().toISOString().slice(0,10);
let db,activeVisitId=null,weekOffset=0,editingTime=null;
function blankDb(){return{customers:[],visits:[],blocks:[],history:[],settings:{theme:'blue',language:'nl'}}}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE)||'null')||blankDb()}catch(e){return blankDb()}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(db))}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function addDaysIso(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function applyTheme(t){t=t||localStorage.getItem('gj_theme')||db.settings.theme||'blue';const c=COLORS[t]||COLORS.blue;document.documentElement.style.setProperty('--primary',c[0]);document.documentElement.style.setProperty('--primary-dark',c[1]);document.documentElement.style.setProperty('--soft',c[2]);db.settings.theme=t;localStorage.setItem('gj_theme',t);document.querySelectorAll('.themeChoice').forEach(b=>b.classList.toggle('active',b.dataset.theme===t))}
function seedDemo(force=false){const d=todayIso();const hasReal=(db.visits||[]).some(v=>!String(v.id).startsWith('demo-'))||(db.customers||[]).some(c=>!String(c.id).startsWith('demo-')); if(hasReal&&!force)return; db.customers=[{id:'demo-c1',name:'Scapino Den Bosch Centrum',street:'Markt',nr:'1',postal:'5211 JV',city:"'s-Hertogenbosch",phone:'0730000000',note:'Demo: wandelafstand vanaf huis/start.'},{id:'demo-c2',name:'Noordbrabants Museum',street:'Verwersstraat',nr:'41',postal:'5211 HT',city:"'s-Hertogenbosch",phone:'0730000001',note:'Demo: korte wandelroute vanaf vorige klant.'},{id:'demo-c3',name:'Scapino Eindhoven',street:'Stationsplein',nr:'22',postal:'5611 AC',city:'Eindhoven',phone:'0400000000',note:'Demo: autoroute vanaf Den Bosch.'},{id:'demo-c4',name:'Scapino Tilburg Centrum',street:'Stadhuisplein',nr:'130',postal:'5038 TC',city:'Tilburg',phone:'0130000000',note:'Demo: autoroute.'},{id:'demo-c5',name:'Scapino Breda',street:'Stationsplein',nr:'16',postal:'4811 BB',city:'Breda',phone:'0760000000',note:'Demo: autoroute.'}]; db.visits=[{id:'demo-v1',customerId:'demo-c1',date:d,time:'08:30',end:'09:00',order:1,status:'Gepland',mode:'drive',leg:'🏠 Neerstraat 1 → klant: 🚗 12 min · 5 km'},{id:'demo-v2',customerId:'demo-c2',date:d,time:'09:10',end:'09:40',order:2,status:'Gepland',mode:'walk',leg:'🚶 Vanaf vorige klant: 6 min · 450 m'},{id:'demo-v3',customerId:'demo-c3',date:d,time:'10:35',end:'11:15',order:3,status:'Gepland',mode:'drive',leg:'🚗 Vanaf vorige klant: 34 min · 37 km'},{id:'demo-pause',pause:true,active:true,date:d,time:'12:15',end:'12:45',order:3.5,leg:'☕ Pauze 30 min'},{id:'demo-v4',customerId:'demo-c4',date:d,time:'13:20',end:'14:00',order:4,status:'Gepland',mode:'drive',leg:'🚗 Vanaf vorige klant: 36 min · 38 km'},{id:'demo-v5',customerId:'demo-c5',date:d,time:'15:00',end:'15:35',order:5,status:'Gepland',mode:'drive',leg:'🚗 Vanaf vorige klant: 31 min · 31 km',returnLeg:'🏠 Terug naar huis: 41 min · 52 km'}];save()}
function syncDemoDate(){const d=todayIso();if((db.visits||[]).some(v=>String(v.id).startsWith('demo-'))){db.visits=db.visits.map(v=>String(v.id).startsWith('demo-')?Object.assign({},v,{date:d}):v);save()}}
function customer(id){return db.customers.find(c=>c.id===id)||{}}
function todayVisits(includeOut=false){return db.visits.filter(v=>v.date===todayIso()&&(includeOut||v.status!=='Uit planning')).sort((a,b)=>(a.order||0)-(b.order||0))}
function navUrl(q){const app=$('navApp').value;if(app==='Waze')return 'https://waze.com/ul?q='+q+'&navigate=yes'; if(app==='Apple Kaarten')return 'http://maps.apple.com/?q='+q; return 'https://www.google.com/maps/search/?api=1&query='+q}
function address(c){return [c.street,c.nr,c.postal,c.city].filter(Boolean).join(' ')}
function fullRouteUrl(){const pts=todayVisits().filter(v=>!v.pause&&v.status!=='Uit planning').map(v=>address(customer(v.customerId))); const all=['Neerstraat 1, Den Bosch'].concat(pts).concat(['Neerstraat 1, Den Bosch']).map(encodeURIComponent); return 'https://www.google.com/maps/dir/'+all.join('/') }
function renderToday(){const vs=todayVisits(),real=vs.filter(v=>!v.pause);$('todayDate').textContent=new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});$('statVisits').textContent=real.length;$('statDone').textContent=real.filter(v=>v.status==='Uitgevoerd'||v.status==='Niet uitgevoerd').length;$('statKm').textContent=real.length?'163':'–';$('statTravel').textContent=real.length?'2u59':'–';$('todayRoute').innerHTML=vs.length?vs.map(cardHtml).join(''):'<div class="card empty">Geen route voor vandaag.</div>'}
function cardHtml(v){if(v.pause){return '<div class="leg pause '+(!v.active?'disabled':'')+'">'+esc(v.leg||'☕ Pauze')+' <span style="margin-left:auto">'+esc((v.time||'')+' - '+(v.end||''))+'</span><div class="smallBtns" style="margin-left:auto"><button class="moveUp secondary" data-id="'+esc(v.id)+'">↑</button><button class="moveDown secondary" data-id="'+esc(v.id)+'">↓</button></div></div>'} const c=customer(v.customerId),q=encodeURIComponent(address(c)),done=v.status==='Uitgevoerd',nd=v.status==='Niet uitgevoerd',out=v.status==='Uit planning',cls=done?'done':(nd?'notdone':(out?'out':'')); const mode=v.mode==='walk'?'walk':'drive'; const timeHtml=editingTime===v.id?'<div class="timeEdit"><input id="editStart-'+esc(v.id)+'" type="time" value="'+esc(v.time||'')+'"><input id="editEnd-'+esc(v.id)+'" type="time" value="'+esc(v.end||'')+'"><button class="saveTimeBtn" data-id="'+esc(v.id)+'">✓</button></div>':'<div class="timeLine"><span class="pill">'+esc((v.time||'')+' - '+(v.end||''))+'</span><button class="eyeBtn secondary" data-id="'+esc(v.id)+'">👁️</button></div>'; return (v.leg?'<div class="leg '+(mode==='walk'?'walk':'')+'">'+esc(v.leg)+'</div>':'')+'<div class="card visitCard '+cls+'"><div class="visitTop"><strong>'+esc(c.name||'Klant')+'</strong><span class="pill">'+esc(v.status||'Gepland')+'</span></div>'+timeHtml+'<div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0"><span class="routeMode '+(mode==='walk'?'walk':'')+'">'+(mode==='walk'?'🚶 Wandelroute':'🚗 Autoroute')+'</span>'+(done?'<span class="doneCheck">✓</span>':'')+'</div><div class="muted">'+esc(c.city||'')+'</div><div>'+esc([c.street,c.nr,c.postal].filter(Boolean).join(' '))+'</div>'+((done||nd)?'<div class="savedLine">'+(done?'✓':'!')+' '+esc(v.status)+' opgeslagen'+((v.photos&&v.photos.length)?' · 📷 '+v.photos.length+' foto(s)':'')+'</div>':'')+'<div class="btnRow"><button class="routeBtn" data-q="'+q+'">Route</button><button class="finishBtn secondary" data-id="'+esc(v.id)+'">'+((done||nd)?'Aanpassen':'Afronden')+'</button></div><div class="smallBtns"><button class="moveUp secondary" data-id="'+esc(v.id)+'">↑</button><button class="moveDown secondary" data-id="'+esc(v.id)+'">↓</button><button class="reschedule secondary" data-id="'+esc(v.id)+'">Herplan</button><button class="removePlan red" data-id="'+esc(v.id)+'">Uit planning</button></div></div>'+(v.returnLeg?'<div class="leg home">'+esc(v.returnLeg)+'</div>':'')}
function renderCalendar(){let out='';for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+weekOffset*7+i);const iso=d.toISOString().slice(0,10);const n=db.visits.filter(v=>v.date===iso&&!v.pause&&v.status!=='Uit planning').length;out+='<div class="dayItem clickable dayOpen" data-date="'+iso+'"><div><strong>'+d.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})+'</strong><br><span class="muted">'+n+' klanten</span></div><span class="pill">open</span></div>'}$('calendarList').innerHTML=out}
function openDay(iso){const vs=db.visits.filter(v=>v.date===iso&&v.status!=='Uit planning').sort((a,b)=>(a.order||0)-(b.order||0));$('calendarDetail').innerHTML='<div class="card"><strong>'+new Date(iso).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})+'</strong>'+(!vs.length?'<div class="empty">Geen planning.</div>':vs.map(v=>v.pause?'<div class="leg pause">'+esc(v.time+' - '+v.end+' '+(v.leg||'Pauze'))+'</div>':'<div class="dayItem"><div><strong>'+esc(customer(v.customerId).name)+'</strong><br><span class="muted">'+esc(v.time+' - '+(v.end||'')+' · '+v.status)+'</span></div></div>').join(''))+'</div>'}
function renderOverview(){const q=($('search').value||'').toLowerCase();const rows=db.customers.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q));$('overviewList').innerHTML=rows.length?rows.map(c=>{const year=new Date().getFullYear();const visits=db.visits.filter(v=>v.customerId===c.id&&String(v.date).startsWith(String(year))).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));return '<div class="card"><strong>'+esc(c.name)+'</strong><div class="muted">'+esc(c.city+' '+c.postal)+'</div><div>'+esc([c.street,c.nr].filter(Boolean).join(' '))+'</div><details style="margin-top:6px"><summary class="pill">'+visits.length+' bezoeken dit jaar</summary>'+visits.map(v=>'<div class="dayItem"><div>'+esc(new Date(v.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}))+' · '+esc((v.time||'')+' - '+(v.end||''))+'<br><span class="muted">'+esc(v.status||'Gepland')+'</span></div></div>').join('')+'</details></div>'}).join(''):'<div class="card empty">Geen klanten gevonden.</div>'}
function renderAbsence(){$('absenceList').innerHTML=(db.blocks||[]).length?db.blocks.slice().reverse().map(b=>'<div class="card"><strong>'+esc(b.type)+'</strong><div>'+esc(b.start)+' t/m '+esc(b.end||b.start)+'</div><div class="muted">'+esc([b.startTime,b.endTime].filter(Boolean).join(' - '))+'</div><div>'+esc(b.note)+'</div></div>').join(''):'<div class="card empty">Nog geen afwezigheid.</div>'}
function recalc(){let order=1;db.visits.filter(v=>v.date===todayIso()&&v.status!=='Uit planning').sort((a,b)=>(a.order||0)-(b.order||0)).forEach(v=>{v.order=order;order+=v.pause?.5:1});save();renderToday();renderCalendar();renderOverview()}
function move(id,dir){const vs=todayVisits(true),i=vs.findIndex(v=>v.id===id); if(i<0)return; const j=i+dir;if(j<0||j>=vs.length)return; const tmp=vs[i].order;vs[i].order=vs[j].order;vs[j].order=tmp;recalc()}
function openFinish(id){activeVisitId=id;const v=db.visits.find(x=>x.id===id);if(!v)return;const c=customer(v.customerId);$('finishTitle').textContent=c.name||'Klant afronden';$('finishMeta').textContent=[v.time+' - '+(v.end||''),c.city].filter(Boolean).join(' · ');$('finishActivity').value=v.activity||'';$('finishSummary').value=v.summary||'';$('finishPhotos').value='';$('existingPhotos').innerHTML=(v.photos||[]).map(p=>'<span class="photoTag">📷 '+esc(p.name||'foto')+'</span>').join('');$('finishOverlay').classList.add('open')}
function closeFinish(){activeVisitId=null;$('finishOverlay').classList.remove('open')}
function finish(status){const v=db.visits.find(x=>x.id===activeVisitId);if(!v)return;const files=Array.from($('finishPhotos').files||[]).map(f=>({name:f.name,size:f.size,type:f.type}));v.photos=(v.photos||[]).concat(files);v.status=status;v.activity=$('finishActivity').value.trim();v.summary=$('finishSummary').value.trim();v.completedAt=new Date().toISOString();const item={id:'hist-'+v.id,visitId:v.id,customerId:v.customerId,status,activity:v.activity,summary:v.summary,photos:v.photos,createdAt:v.completedAt};const idx=db.history.findIndex(h=>h.visitId===v.id);if(idx>=0)db.history[idx]=item;else db.history.push(item);save();closeFinish();renderToday();renderOverview();alert(status+' opgeslagen.')}
function setLanguage(lang){db.settings.language=lang; const txt={nl:['Vandaag','Kalender','Overzicht','Afwezigheid','Instellingen'],de:['Heute','Kalender','Übersicht','Abwesenheit','Einstellungen'],en:['Today','Calendar','Overview','Absence','Settings']}[lang]||null; if(txt){document.querySelectorAll('#menuPanel button[data-screen]').forEach((b,i)=>{const active=b.classList.contains('active');b.textContent=(active?'👁️ ':'')+txt[i]})} save()}
function init(){db=load();seedDemo();syncDemoDate();applyTheme(db.settings.theme);$('lang').value=db.settings.language||'nl';$('blockStart').value=todayIso();$('blockEnd').value=addDaysIso(todayIso(),1);$('menuBtn').onclick=()=>$('menuPanel').classList.toggle('open');document.querySelectorAll('#menuPanel button[data-screen]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(b.dataset.screen).classList.add('active');document.querySelectorAll('#menuPanel button[data-screen]').forEach(x=>{x.classList.remove('active');x.textContent=x.textContent.replace(/^👁️\s*/,'')});b.classList.add('active');b.textContent='👁️ '+b.textContent.replace(/^👁️\s*/,'');$('menuPanel').classList.remove('open')});document.addEventListener('click',e=>{const r=e.target.closest('.routeBtn');if(r){location.href=navUrl(r.dataset.q);return}const f=e.target.closest('.finishBtn');if(f){openFinish(f.dataset.id);return}const up=e.target.closest('.moveUp');if(up){move(up.dataset.id,-1);return}const down=e.target.closest('.moveDown');if(down){move(down.dataset.id,1);return}const eye=e.target.closest('.eyeBtn');if(eye){editingTime=eye.dataset.id;renderToday();return}const sv=e.target.closest('.saveTimeBtn');if(sv){const v=db.visits.find(x=>x.id===sv.dataset.id);if(v){v.time=$('editStart-'+v.id).value;v.end=$('editEnd-'+v.id).value;editingTime=null;save();renderToday();renderOverview()}return}const rem=e.target.closest('.removePlan');if(rem){if(confirm('Deze klant uit de planning halen?')){const v=db.visits.find(x=>x.id===rem.dataset.id);if(v){v.status='Uit planning';save();renderToday();renderCalendar();renderOverview()}}return}const reh=e.target.closest('.reschedule');if(reh){const v=db.visits.find(x=>x.id===reh.dataset.id);const nd=prompt('Nieuwe datum (YYYY-MM-DD):',v.date);if(nd){v.date=nd;save();renderToday();renderCalendar();renderOverview()}return}const day=e.target.closest('.dayOpen');if(day){openDay(day.dataset.date);return}if(e.target.id==='finishOverlay')closeFinish()});$('fullRouteBtn').onclick=()=>{location.href=fullRouteUrl()};$('togglePause').onclick=()=>{db.visits.filter(v=>v.pause&&v.date===todayIso()).forEach(v=>v.active=!v.active);save();renderToday()};$('recalcBtn').onclick=recalc;$('resetDemo').onclick=()=>{seedDemo(true);syncDemoDate();renderToday();renderCalendar();renderOverview()};$('sortTime').onclick=()=>{db.visits.sort((a,b)=>(a.time||'').localeCompare(b.time||''));db.visits.forEach((v,i)=>v.order=i+1);save();renderToday()};$('prevWeek').onclick=()=>{weekOffset--;renderCalendar()};$('nextWeek').onclick=()=>{weekOffset++;renderCalendar()};$('search').oninput=renderOverview;$('finishClose').onclick=closeFinish;$('btnDone').onclick=()=>finish('Uitgevoerd');$('btnNotDone').onclick=()=>finish('Niet uitgevoerd');$('blockStart').onchange=()=>{const end=addDaysIso($('blockStart').value,1);$('blockEnd').value=end;$('blockEnd').min=end};$('blockEnd').onchange=()=>{const min=addDaysIso($('blockStart').value,1);if($('blockEnd').value<min)$('blockEnd').value=min};$('saveBlock').onclick=()=>{if(!$('blockStart').value)return alert('Vul startdatum in.');const min=addDaysIso($('blockStart').value,1);if(!$('blockEnd').value||$('blockEnd').value<min)$('blockEnd').value=min;db.blocks.push({id:'b-'+Date.now(),type:$('blockType').value,start:$('blockStart').value,end:$('blockEnd').value,startTime:$('blockStartTime').value,endTime:$('blockEndTime').value,note:$('blockNote').value});save();renderAbsence();alert('Afwezigheid opgeslagen.')};document.querySelectorAll('.themeChoice').forEach(b=>b.onclick=()=>{applyTheme(b.dataset.theme);save()});$('lang').onchange=()=>setLanguage($('lang').value);$('saveSettings').onclick=()=>{setLanguage($('lang').value);if($('defaultSettings').checked){localStorage.setItem('gj_theme',db.settings.theme);localStorage.setItem('gj_app_language',db.settings.language)}alert('Instellingen opgeslagen.')};setLanguage(db.settings.language||'nl');renderToday();renderCalendar();renderOverview();renderAbsence();setTimeout(()=>$('splash').classList.add('hide'),850)}
window.addEventListener('load',init);
})();
</script>
</body></html>
