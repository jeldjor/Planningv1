function syncDemoDate(){const d=todayIso();if((db.visits||[]).some(v=>String(v.id).startsWith('demo-'))){db.visits=db.visits.map(v=>String(v.id).startsWith('demo-')?Object.assign({},v,{date:d}):v);save()}}function customer(id){return db.customers.find(c=>c.id===id)||{}}function todayVisits(includeOut=false){return db.visits.filter(v=>v.date===todayIso()&&(includeOut||v.status!=='Uit planning')&&(!v.pause||v.active!==false)).sort((a,b)=>(a.order||0)-(b.order||0))}function address(c){return [c.street,c.nr,c.postal,c.city].filter(Boolean).join(' ')}function navUrl(q){const app=$('navApp').value;if(app==='Waze')return 'https://waze.com/ul?q='+q+'&navigate=yes'; if(app==='Apple Kaarten')return 'http://maps.apple.com/?q='+q; return 'https://www.google.com/maps/search/?api=1&query='+q}function fullRouteUrl(){const pts=todayVisits().filter(v=>!v.pause&&v.status!=='Uit planning').map(v=>address(customer(v.customerId)));return 'https://www.google.com/maps/dir/'+['Neerstraat 1, Den Bosch'].concat(pts).concat(['Neerstraat 1, Den Bosch']).map(encodeURIComponent).join('/')}function timeToMin(x){if(!x)return null;const p=x.split(':').map(Number);return p[0]*60+p[1]}function minToTime(m){m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}function durationOf(v){const s=timeToMin(v.time),e=timeToMin(v.end);if(s!==null&&e!==null){let d=e-s;if(d<0)d+=1440;return Math.max(5,d)}return v.pause?30:35}function travelMinutes(v){const m=String(v.leg||'').match(/(\d+)\s*min/i);return m?parseInt(m[1],10):10}function recalcFrom(id){recalcAll(false)}
function recalcAll(doRender=true){
  const vs=db.visits.filter(v=>v.date===todayIso()&&v.status!=='Uit planning'&&(!v.pause||v.active!==false)).sort((a,b)=>(a.order||0)-(b.order||0));
  let cur=timeToMin($('depart')?.value||'08:00') || 480;
  vs.forEach((v,i)=>{
    cur += travelMinutes(v);
    const dur=durationOf(v);
    v.time=minToTime(cur);
    v.end=minToTime(cur+dur);
    cur += dur;
  });
  save();
  if(doRender) renderAll();
}
function renderToday(){const vs=todayVisits(),real=vs.filter(v=>!v.pause);$('todayDate').textContent=new Date().toLocaleDateString(db.settings.language==='en'?'en-GB':db.settings.language==='de'?'de-DE':'nl-NL',{weekday:'long',day:'numeric',month:'long'});$('statVisits').textContent=real.length;$('statDone').textContent=real.filter(v=>v.status==='Uitgevoerd'||v.status==='Niet uitgevoerd').length;$('statKm').textContent=real.length?'163':'–';$('statTravel').textContent=real.length?'2u59':'–';$('todayRoute').innerHTML=vs.length?vs.map(cardHtml).join(''):'<div class="card empty">'+t('dayNoPlan')+'</div>'}
function cardHtml(v){if(v.pause)return '<div class="leg pause">'+esc(v.leg||'☕ Pauze')+' <span style="margin-left:auto">'+esc((v.time||'')+' - '+(v.end||''))+'</span><div class="smallBtns"><button class="moveUp secondary" data-id="'+esc(v.id)+'">↑</button><button class="moveDown secondary" data-id="'+esc(v.id)+'">↓</button></div></div>';const c=customer(v.customerId),q=encodeURIComponent(address(c)),done=v.status==='Uitgevoerd',nd=v.status==='Niet uitgevoerd',out=v.status==='Uit planning',cls=done?'done':(nd?'notdone':(out?'out':'')),mode=v.mode==='walk'?'walk':'drive';const timeHtml=editingTime===v.id?'<div class="timeEdit"><input id="editStart-'+esc(v.id)+'" type="time" value="'+esc(v.time||'')+'"><input id="editEnd-'+esc(v.id)+'" type="time" value="'+esc(v.end||'')+'"><button class="saveTimeBtn" data-id="'+esc(v.id)+'">✓</button></div>':'<div class="timeLine"><span class="pill">'+esc((v.time||'')+' - '+(v.end||''))+'</span><button class="eyeBtn secondary" data-id="'+esc(v.id)+'">👁️</button></div>';return (v.leg?'<div class="leg '+(mode==='walk'?'walk':'')+'">'+esc(v.leg)+'</div>':'')+'<div class="card visitCard '+cls+'"><div class="visitTop"><strong>'+esc(c.name||'Klant')+'</strong><span class="pill">'+esc(ts(v.status||'Gepland'))+'</span></div>'+timeHtml+'<div style="display:flex;gap:6px;flex-wrap:wrap;margin:5px 0"><span class="routeMode '+(mode==='walk'?'walk':'')+'">'+(mode==='walk'?'🚶 '+t('routeWalk'):'🚗 '+t('routeAuto'))+'</span></div><div class="muted">'+esc(c.city||'')+'</div><div>'+esc([c.street,c.nr,c.postal].filter(Boolean).join(' '))+'</div>'+((done||nd)?'<div class="savedLine">'+(done?'✓':'!')+' '+esc(ts(v.status))+' '+t('saved')+((v.photos&&v.photos.length)?' · 📷 '+v.photos.length+' foto(s)':'')+'</div>':'')+'<div class="btnRow"><button class="routeBtn" data-q="'+q+'">'+t('route')+'</button><button class="finishBtn secondary" data-id="'+esc(v.id)+'">'+((done||nd)?t('edit'):t('finish'))+'</button></div><div class="smallBtns"><button class="moveUp secondary" data-id="'+esc(v.id)+'">↑</button><button class="moveDown secondary" data-id="'+esc(v.id)+'">↓</button><button class="removePlan red" data-id="'+esc(v.id)+'">'+t('remove')+'</button></div></div>'+(v.returnLeg?'<div class="leg home">'+esc(v.returnLeg)+'</div>':'')}
function renderCalendar(){const base=new Date();base.setMonth(base.getMonth()+monthOffset,1);const year=base.getFullYear(),month=base.getMonth(),locale=db.settings.language==='en'?'en-GB':db.settings.language==='de'?'de-DE':'nl-NL';$('monthTitle').textContent=base.toLocaleDateString(locale,{month:'long',year:'numeric'});const first=new Date(year,month,1),start=new Date(first);start.setDate(first.getDate()-((first.getDay()+6)%7));const dows=db.settings.language==='en'?['mo','tu','we','th','fr','sa','su']:db.settings.language==='de'?['mo','di','mi','do','fr','sa','so']:['ma','di','wo','do','vr','za','zo'];let out='<div class="monthGrid">'+dows.map(d=>'<div class="monthDow">'+d+'</div>').join('');for(let i=0;i<42;i++){const cur=new Date(start);cur.setDate(start.getDate()+i);const iso=cur.toISOString().slice(0,10),vis=db.visits.filter(v=>v.date===iso&&!v.pause&&v.status!=='Uit planning'),blocks=(db.blocks||[]).filter(b=>b.start<=iso&&(b.end||b.start)>=iso),cls=['monthDay',cur.getMonth()===month?'':'other',iso===todayIso()?'today':'',iso===selectedCalendarDate?'selected':''].join(' ');out+='<div class="'+cls+'" data-date="'+iso+'"><div class="monthNo">'+cur.getDate()+'</div>';if(vis.length)out+='<span class="monthBadge customers">'+vis.length+'</span>';if(blocks.length)out+='<span class="monthBadge absence">'+esc(blocks[0].type||'afw')+'</span>';out+='</div>'}out+='</div>';$('calendarList').innerHTML=out}
function openDay(iso){selectedCalendarDate=iso;const vs=db.visits.filter(v=>v.date===iso&&v.status!=='Uit planning').sort((a,b)=>(a.order||0)-(b.order||0));$('calendarDetail').innerHTML='<div class="card"><strong>'+new Date(iso).toLocaleDateString(db.settings.language==='en'?'en-GB':db.settings.language==='de'?'de-DE':'nl-NL',{weekday:'long',day:'numeric',month:'long'})+'</strong>'+(!vs.length?'<div class="empty">'+t('dayNoPlan')+'</div>':vs.map(v=>v.pause?'<div class="leg pause">'+esc((v.time||'')+' - '+(v.end||'')+' '+(v.leg||'Pauze'))+'</div>':'<div class="dayItem"><div><strong>'+esc(customer(v.customerId).name)+'</strong><br><span class="muted">'+esc((v.time||'')+' - '+(v.end||'')+' · '+ts(v.status||''))+'</span></div></div>').join(''))+'</div>';renderCalendar()}
function renderOverview(){const q=($('search').value||'').toLowerCase();const rows=db.customers.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q));const todayDone=db.visits.filter(v=>v.date===todayIso()&&!v.pause&&(v.status==='Uitgevoerd'||v.status==='Niet uitgevoerd'));let todayHtml=todayDone.length?'<div class="card"><strong>'+t('today')+' - '+t('executed')+'</strong>'+todayDone.map(v=>{const c=customer(v.customerId);return '<div class="dayItem"><div><strong>'+esc(c.name)+'</strong><br><span class="muted">'+esc(ts(v.status)+' · '+(v.time||'')+' - '+(v.end||''))+'</span><br>'+esc(v.activity||'')+'<br>'+esc(v.summary||'')+((v.photos&&v.photos.length)?'<br>📷 '+v.photos.length+' foto(s)':'')+'</div></div>'}).join('')+'</div>':'';$('overviewList').innerHTML=todayHtml+(rows.length?rows.map(c=>{const year=new Date().getFullYear();const visits=db.visits.filter(v=>v.customerId===c.id&&String(v.date).startsWith(String(year))).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));return '<div class="card"><strong>'+esc(c.name)+'</strong><div class="muted">'+esc(c.city+' '+c.postal)+'</div><div>'+esc([c.street,c.nr].filter(Boolean).join(' '))+'</div><details style="margin-top:6px"><summary class="pill">'+visits.length+' '+t('visitsThisYear')+'</summary>'+visits.map(v=>'<div class="dayItem"><div>'+esc(new Date(v.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}))+' · '+esc((v.time||'')+' - '+(v.end||''))+'<br><span class="muted">'+esc(ts(v.status||'Gepland'))+'</span></div></div>').join('')+'</details></div>'}).join(''):'<div class="card empty">'+t('noCustomers')+'</div>')}
function renderAbsence(){$('absenceList').innerHTML=(db.blocks||[]).length?db.blocks.slice().reverse().map(b=>'<div class="card"><strong>'+esc(b.type)+'</strong><div>'+esc(b.start)+' t/m '+esc(b.end||b.start)+'</div><div class="muted">'+esc([b.startTime,b.endTime].filter(Boolean).join(' - '))+'</div><div>'+esc(b.note)+'</div></div>').join(''):'<div class="card empty">'+t('noAbsence')+'</div>'}function renderAll(){applyLang();renderToday();renderCalendar();renderOverview();renderAbsence()}function move(id,dir){const vs=todayVisits(true),i=vs.findIndex(v=>v.id===id),j=i+dir;if(i<0||j<0||j>=vs.length)return;const tmp=vs[i].order;vs[i].order=vs[j].order;vs[j].order=tmp;recalcAll(true)}function openFinish(id){activeVisitId=id;const v=db.visits.find(x=>x.id===id);if(!v)return;const c=customer(v.customerId);$('finishTitle').textContent=c.name||'Klant afronden';$('finishMeta').textContent=[(v.time||'')+' - '+(v.end||''),c.city].filter(Boolean).join(' · ');$('finishActivity').value=v.activity||'';$('finishSummary').value=v.summary||'';$('finishPhotos').value='';$('existingPhotos').innerHTML=(v.photos||[]).map(p=>'<span class="photoTag">📷 '+esc(p.name||'foto')+'</span>').join('');$('finishOverlay').classList.add('open')}function closeFinish(){activeVisitId=null;$('finishOverlay').classList.remove('open')}function finish(status){const v=db.visits.find(x=>x.id===activeVisitId);if(!v)return;const files=Array.from($('finishPhotos').files||[]).map(f=>({name:f.name,size:f.size,type:f.type}));v.photos=(v.photos||[]).concat(files);v.status=status;v.activity=$('finishActivity').value.trim();v.summary=$('finishSummary').value.trim();v.completedAt=new Date().toISOString();const item={id:'hist-'+v.id,visitId:v.id,customerId:v.customerId,status,activity:v.activity,summary:v.summary,photos:v.photos,createdAt:v.completedAt};const idx=db.history.findIndex(h=>h.visitId===v.id);if(idx>=0)db.history[idx]=item;else db.history.push(item);save();closeFinish();renderAll();alert(ts(status)+' '+t('saved'))}
function init(){db=load();seedDemo();syncDemoDate();applyTheme(db.settings.theme);$('lang').value=db.settings.language||'nl';$('blockStart').value=todayIso();$('blockEnd').value=addDaysIso(todayIso(),1);$('blockEnd').min=addDaysIso(todayIso(),1);$('menuBtn').onclick=()=>$('menuPanel').classList.toggle('open');document.querySelectorAll('#menuPanel button[data-screen]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(b.dataset.screen).classList.add('active');document.querySelectorAll('#menuPanel button[data-screen]').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('menuPanel').classList.remove('open');renderAll()});document.addEventListener('click',e=>{const r=e.target.closest('.routeBtn');if(r){location.href=navUrl(r.dataset.q);return}const f=e.target.closest('.finishBtn');if(f){openFinish(f.dataset.id);return}const up=e.target.closest('.moveUp');if(up){move(up.dataset.id,-1);return}const down=e.target.closest('.moveDown');if(down){move(down.dataset.id,1);return}const eye=e.target.closest('.eyeBtn');if(eye){editingTime=eye.dataset.id;renderToday();return}const sv=e.target.closest('.saveTimeBtn');if(sv){const v=db.visits.find(x=>x.id===sv.dataset.id);if(v){v.time=$('editStart-'+v.id).value;v.end=$('editEnd-'+v.id).value;editingTime=null;recalcAll(true)}return}const rem=e.target.closest('.removePlan');if(rem){if(confirm(t('removeConfirm'))){const v=db.visits.find(x=>x.id===rem.dataset.id);if(v){v.status='Uit planning';save();renderAll()}}return}const day=e.target.closest('.monthDay');if(day){openDay(day.dataset.date);return}if(e.target.id==='finishOverlay')closeFinish()});$('depart').onchange=()=>recalcAll(true);$('fullRouteBtn').onclick=()=>{location.href=fullRouteUrl()};$('togglePause').onclick=()=>{db.visits.filter(v=>v.pause&&v.date===todayIso()).forEach(v=>v.active=v.active===false?true:false);save();renderAll()};$('recalcBtn').onclick=recalcAll;$('resetDemo').onclick=()=>{seedDemo(true);syncDemoDate();renderAll()};$('prevMonth').onclick=()=>{monthOffset--;renderAll()};$('nextMonth').onclick=()=>{monthOffset++;renderAll()};$('search').oninput=renderOverview;$('finishClose').onclick=closeFinish;$('btnDone').onclick=()=>finish('Uitgevoerd');$('btnNotDone').onclick=()=>finish('Niet uitgevoerd');$('blockStart').onchange=()=>{const end=addDaysIso($('blockStart').value,1);$('blockEnd').value=end;$('blockEnd').min=end};$('blockEnd').onchange=()=>{const min=addDaysIso($('blockStart').value,1);if($('blockEnd').value<min)$('blockEnd').value=min};$('saveBlock').onclick=()=>{if(!$('blockStart').value)return alert('Vul startdatum in.');const min=addDaysIso($('blockStart').value,1);if(!$('blockEnd').value||$('blockEnd').value<min)$('blockEnd').value=min;db.blocks.push({id:'b-'+Date.now(),type:$('blockType').value,start:$('blockStart').value,end:$('blockEnd').value,startTime:$('blockStartTime').value,endTime:$('blockEndTime').value,note:$('blockNote').value});save();renderAll();alert(t('absenceSaved'))};document.querySelectorAll('.themeChoice').forEach(b=>b.onclick=()=>{applyTheme(b.dataset.theme);save()});$('lang').onchange=()=>{db.settings.language=$('lang').value;save();renderAll()};$('saveSettings').onclick=()=>{db.settings.language=$('lang').value;if($('defaultSettings').checked){localStorage.setItem('gj_theme',db.settings.theme);localStorage.setItem('gj_app_language',db.settings.language)}save();renderAll();alert(t('settingsSaved'))};renderAll();setTimeout(()=>{const sp=$('splash'); if(sp){sp.classList.add('hide'); sp.style.display='none'}},700)}
