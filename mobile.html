</nav>
<main>
<section id="today" class="screen active"><h1>Vandaag</h1><p class="muted" id="todayDate"></p><div class="panel"><div class="grid2"><label>Vertrektijd<input id="depart" type="time" value="08:00" placeholder="08:00"></label><label>Route-app<select id="navApp"><option>Waze</option><option>Google Maps</option><option>Apple Kaarten</option></select></label></div><div class="stats" style="margin-top:10px"><div class="stat"><strong id="statVisits">0</strong><span>klanten</span></div><div class="stat"><strong id="statKm">–</strong><span>km</span></div><div class="stat"><strong id="statDone">0</strong><span>klaar</span></div></div></div><div class="demoNotice">Demo-planning Noord-Brabant: 1 wandelstuk, rest auto.</div><div id="todayRoute"></div></section>
<section id="calendar" class="screen"><h1>Kalender</h1><p class="muted">Alleen bekijken.</p><div class="panel"><div class="grid2"><button id="prevWeek" class="secondary">Vorige</button><button id="nextWeek" class="secondary">Volgende</button></div><div id="calendarList" style="margin-top:8px"></div></div></section>
<section id="overview" class="screen"><h1>Overzicht</h1><label>Zoeken<input id="search" placeholder="Zoek klant, plaats of postcode"></label><div id="overviewList" style="margin-top:10px"></div></section>
<section id="absence" class="screen"><h1>Afwezigheid</h1><div class="panel"><div class="form"><label>Type<select id="blockType"><option>Verlof</option><option>Ziekte</option><option>Training</option><option>Overig</option></select></label><div class="formRow"><label>Startdatum<input id="blockStart" type="date" placeholder="Datum"></label><label>Einddatum<input id="blockEnd" type="date" placeholder="Datum"></label></div><div class="formRow"><label>Starttijd<input id="blockStartTime" type="time" placeholder="09:00"></label><label>Eindtijd<input id="blockEndTime" type="time" placeholder="12:30"></label></div><label>Omschrijving<textarea id="blockNote" placeholder="Bijv. tandarts, verlof ochtend of training"></textarea></label><button id="saveBlock">Opslaan</button></div></div><div id="absenceList"></div></section>
<section id="settings" class="screen"><h1>Instellingen</h1><div class="panel form"><label>Taal<select id="lang"><option value="nl">Nederlands</option><option value="de">Deutsch</option><option value="en">English</option></select></label><label>Kleurmodus</label><div class="themeGrid"><button class="themeChoice blue" data-theme="blue" title="Blauw"></button><button class="themeChoice green" data-theme="green" title="Groen"></button><button class="themeChoice purple" data-theme="purple" title="Paars"></button><button class="themeChoice orange" data-theme="orange" title="Oranje"></button><button class="themeChoice red" data-theme="red" title="Rood"></button></div><label style="display:flex;grid-template-columns:auto 1fr;align-items:center;gap:8px"><input id="defaultSettings" type="checkbox" style="width:auto;height:auto"> Als standaard gebruiken</label><button id="saveSettings">Instellingen opslaan</button><div class="settingsVersion">Versie: v3.7 mobile<br>Supabase: nog niet gekoppeld</div></div></section>

<div id="finishOverlay" class="finishOverlay">
  <div class="finishSheet">
    <div class="finishHead"><div><strong id="finishTitle">Klant afronden</strong><div id="finishMeta" class="muted"></div></div><button id="finishClose" class="finishClose">Sluit</button></div>
    <div class="form">
      <label>Activiteit<input id="finishActivity" class="finishActivity" placeholder="Bijv. winkelcheck, schapcontrole"></label>
      <label>Samenvatting<textarea id="finishSummary" class="finishSummary" placeholder="Typ hier uitgebreid wat er is gedaan, bijzonderheden, afspraken of opmerkingen..."></textarea></label>
      <div class="photoBox"><strong>Foto's</strong><input id="finishPhotos" type="file" accept="image/*" capture="environment" multiple><span class="muted">Voeg foto’s toe van de winkel/uitvoering.</span></div>
      <div class="finishActions"><button id="btnDone">Uitgevoerd</button><button id="btnNotDone" class="notDone">Niet uitgevoerd</button></div>
    </div>
  </div>
</div>
</main>
<script>
const VERSION='v3.7';
const COLORS={blue:['#315f9f','#254b7e','#eef4fb'],green:['#208250','#166534','#edf7f1'],purple:['#6d3bc2','#552b9a','#f5f3ff'],orange:['#f97316','#c2410c','#fff7ed'],red:['#c03434','#991b1b','#fbefef']};
const $=id=>document.getElementById(id); const todayIso=()=>new Date().toISOString().slice(0,10);
function loadDb(){try{return JSON.parse(localStorage.getItem('bp_pro_v2')||'{}')}catch(e){return {}}}
function saveDb(db){localStorage.setItem('bp_pro_v2',JSON.stringify(db||{}))}
let db=loadDb(); db.customers=db.customers||[]; db.visits=db.visits||[]; db.blocks=db.blocks||[]; db.history=db.history||[]; db.settings=db.settings||{};
function applyTheme(t){t=t||localStorage.getItem('gj_theme')||db.settings.theme||'blue'; const c=COLORS[t]||COLORS.blue; document.documentElement.style.setProperty('--primary',c[0]);document.documentElement.style.setProperty('--primary-dark',c[1]);document.documentElement.style.setProperty('--soft',c[2]);document.querySelectorAll('.themeChoice').forEach(b=>b.classList.toggle('active',b.dataset.theme===t)); localStorage.setItem('gj_theme',t); db.settings.theme=t;}

function seedDemoData(){
  const d=todayIso();
  const isDemoData=(db.customers||[]).some(c=>String(c.id||'').startsWith('demo-')) || (db.visits||[]).some(v=>String(v.id||'').startsWith('visit-demo') || String(v.id||'')==='pause-demo');
  const hasRealData=(db.customers&&db.customers.length>0)||(db.visits&&db.visits.length>0);
  if(hasRealData && !isDemoData) return;
  db.customers=[
    {id:'demo-denbosch-1',Winkel:'Stadhuis Den Bosch',Straat:'Markt',Huisnr:'1',Postcode:'5211 JV',Plaats:"'s-Hertogenbosch",Notitie:'Demo: startpunt centrum.'},
    {id:'demo-denbosch-2',Winkel:'Noordbrabants Museum',Straat:'Verwersstraat',Huisnr:'41',Postcode:'5211 HT',Plaats:"'s-Hertogenbosch",Notitie:'Demo: korte wandelstop vanaf Markt.'},
    {id:'demo-eindhoven-1',Winkel:'Eindhoven Centraal',Straat:'Stationsplein',Huisnr:'22',Postcode:'5611 AC',Plaats:'Eindhoven',Notitie:'Demo: auto vanaf Den Bosch.'},
    {id:'demo-eindhoven-2',Winkel:'Van Abbemuseum',Straat:'Bilderdijklaan',Huisnr:'10',Postcode:'5611 NH',Plaats:'Eindhoven',Notitie:'Demo: auto/centrum Eindhoven.'},
    {id:'demo-tilburg-1',Winkel:'Stadhuis Tilburg',Straat:'Stadhuisplein',Huisnr:'130',Postcode:'5038 TC',Plaats:'Tilburg',Notitie:'Demo: auto richting Tilburg.'},
    {id:'demo-breda-1',Winkel:'Station Breda',Straat:'Stationsplein',Huisnr:'16',Postcode:'4811 BB',Plaats:'Breda',Notitie:'Demo: laatste autorit.'}
  ];
  db.visits=[
    {id:'visit-demo-1',customerId:'demo-denbosch-1',date:d,time:'08:30',order:1,status:'Gepland',routeMode:'drive',travelText:'🏠 Vanaf huis: 🚗 12 min · 5 km'},
    {id:'visit-demo-2',customerId:'demo-denbosch-2',date:d,time:'09:05',order:2,status:'Gepland',routeMode:'walk',travelText:'🚶 Vanaf vorige klant: 6 min · 450 m'},
    {id:'visit-demo-3',customerId:'demo-eindhoven-1',date:d,time:'10:30',order:3,status:'Gepland',routeMode:'drive',travelText:'🚗 Vanaf vorige klant: 34 min · 37 km'},
    {id:'pause-demo',isPause:true,date:d,time:'12:15',order:3.5,status:'Pauze',travelText:'☕ Pauze 30 min'},
    {id:'visit-demo-4',customerId:'demo-eindhoven-2',date:d,time:'13:00',order:4,status:'Gepland',routeMode:'drive',travelText:'🚗 Vanaf vorige klant: 9 min · 3 km'},
    {id:'visit-demo-5',customerId:'demo-tilburg-1',date:d,time:'14:10',order:5,status:'Bezocht',routeMode:'drive',travelText:'🚗 Vanaf vorige klant: 36 min · 38 km'},
    {id:'visit-demo-6',customerId:'demo-breda-1',date:d,time:'15:35',order:6,status:'Gepland',routeMode:'drive',travelText:'🚗 Vanaf vorige klant: 31 min · 31 km',returnText:'🏠 Terug naar huis: 41 min · 52 km'}
  ];
  db.routeStats=db.routeStats||{}; db.routeStats[d]={km:166,time:'3u 09m'};
  saveDb(db); localStorage.setItem('gj_demo_seed_v36',d);
}

function cById(id){return db.customers.find(c=>String(c.ID||c.id||'')===String(id))||{}}
function visitDate(v){return v.date||v.datum||v.Datum||''} function visitStatus(v){return v.status||v.Status||'Gepland'}
function render(){db=loadDb(); db.customers=db.customers||[]; db.visits=db.visits||[]; db.blocks=db.blocks||[]; db.history=db.history||[]; db.settings=db.settings||{}; seedDemoData(); applyTheme(localStorage.getItem('gj_theme')||db.settings.theme||'blue'); $('todayDate').textContent=new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'}); renderToday(); renderCalendar(); renderOverview(); renderAbsence();}
function renderToday(){const d=todayIso(); const vs=db.visits.filter(v=>visitDate(v)===d && visitStatus(v)!=='Uit planning').sort((a,b)=>(a.order||0)-(b.order||0)); const real=vs.filter(v=>!v.isPause); $('statVisits').textContent=real.length; $('statDone').textContent=real.filter(v=>['Bezocht','Uitgevoerd'].includes(visitStatus(v))).length; $('statKm').textContent=db.routeStats&&db.routeStats[d]?Math.round(db.routeStats[d].km||0):'–'; $('todayRoute').innerHTML=vs.length?vs.map(v=>visitCard(v)).join(''):'<div class="card empty">Geen route voor vandaag.</div>';}
function visitCard(v){
 if(v.isPause){return `<div class="leg pause">${v.travelText||'☕ Pauze'}</div>`}
 const c=cById(v.customerId); const name=c.Winkel||v.customerName||'Klant'; const place=c.Plaats||''; const address=[c.Straat,c.Huisnr,c.Postcode].filter(Boolean).join(' '); const time=v.time||v.starttijd||''; const q=encodeURIComponent([address,place].filter(Boolean).join(' ')); const isWalk=(v.routeMode==='walk'); const modeText=isWalk?'🚶 Wandelroute':'🚗 Autoroute'; const status=visitStatus(v); const done=['Bezocht','Uitgevoerd'].includes(status);
 return `${v.travelText?`<div class="leg ${isWalk?'walk':''}">${v.travelText}</div>`:''}<div class="card visitCard ${done?'done':''}"><div class="visitTop"><strong>${name}</strong><span class="pill">${time||'tijd onbekend'}</span></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0"><span class="routeMode ${isWalk?'walk':'drive'}">${modeText}</span><span class="pill">${status}</span>${done?'<span class="doneCheck">✓</span>':''}</div><div class="muted">${place}</div><div>${address||''}</div>${done?`<div class="savedLine">✓ ${status} opgeslagen${v.completedAt?' · '+new Date(v.completedAt).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}):''}</div>`:''}<div class="btnRow"><button type="button" class="routeBtn" data-nav="${q}">Route</button><button type="button" class="secondary finishBtn" data-visit="${v.id}">Afronden</button></div></div>${v.returnText?`<div class="leg home">${v.returnText}</div>`:''}`
}
function openNav(q){
 const app=($('navApp')&&$('navApp').value)||'Google Maps';
 let url=`https://www.google.com/maps/search/?api=1&query=${q}`;
 if(app==='Waze') url=`https://waze.com/ul?q=${q}&navigate=yes`;
 if(app==='Apple Kaarten') url=`http://maps.apple.com/?q=${q}`;
 // iPhone/PWA: window.open kan geblokkeerd worden. location.href werkt betrouwbaarder.
 try{ window.location.href=url; }catch(e){ location.assign(url); }
}
let activeFinishId=null;
function openFinish(id){activeFinishId=id; const v=db.visits.find(x=>x.id===id); if(!v)return; const c=cById(v.customerId); $('finishTitle').textContent=c.Winkel||'Klant afronden'; $('finishMeta').textContent=[v.time,c.Plaats].filter(Boolean).join(' · '); $('finishActivity').value=v.activity||''; $('finishSummary').value=v.summary||''; $('finishOverlay').classList.add('open');}
function closeFinish(){ $('finishOverlay').classList.remove('open'); activeFinishId=null; }
function finishVisit(status){
 const v=db.visits.find(x=>String(x.id)===String(activeFinishId));
 if(!v){ alert('Geen klant geselecteerd.'); return; }
 const files=Array.from(($('finishPhotos')&&$('finishPhotos').files)||[]).map(f=>({name:f.name,size:f.size,type:f.type,lastModified:f.lastModified}));
 v.status=status;
 v.activity=($('finishActivity')&&$('finishActivity').value||'').trim();
 v.summary=($('finishSummary')&&$('finishSummary').value||'').trim();
 v.photos=files;
 v.completedAt=new Date().toISOString();
 db.history=db.history||[];
 const existingIndex=db.history.findIndex(h=>String(h.visitId)===String(v.id));
 const item={id:existingIndex>=0?db.history[existingIndex].id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())),visitId:v.id,customerId:v.customerId,status:v.status,activity:v.activity,summary:v.summary,photos:files,photoCount:files.length,createdAt:v.completedAt};
 if(existingIndex>=0) db.history[existingIndex]=item; else db.history.push(item);
 saveDb(db);
 closeFinish();
 render();
 setTimeout(()=>alert(status+' opgeslagen.'),50);
}
let weekOffset=0; function addDays(n){const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10)}
function renderCalendar(){let html=''; for(let i=0;i<7;i++){const d=addDays(weekOffset*7+i); const n=db.visits.filter(v=>visitDate(v)===d&&visitStatus(v)!=='Uit planning').length; html+=`<div class="dayItem"><div><strong>${new Date(d).toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})}</strong><br><span class="muted">${n} klanten</span></div><span class="pill">bekijken</span></div>`} $('calendarList').innerHTML=html;}
function renderOverview(){const q=($('search')?.value||'').toLowerCase(); const rows=db.customers.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q)).slice(0,80); $('overviewList').innerHTML=rows.length?rows.map(c=>`<div class="card"><strong>${c.Winkel||c.naam||'Klant'}</strong><div class="muted">${c.Plaats||''} ${c.Postcode||''}</div><div>${[c.Straat,c.Huisnr].filter(Boolean).join(' ')}</div></div>`).join(''):'<div class="card empty">Geen klanten gevonden.</div>';}
function renderAbsence(){const blocks=(db.blocks||[]).slice().sort((a,b)=>(b.start||'').localeCompare(a.start||'')).slice(0,20); $('absenceList').innerHTML=blocks.length?blocks.map(b=>`<div class="card"><strong>${b.type||'Afwezigheid'}</strong><div>${b.start||''}${b.end&&b.end!==b.start?' t/m '+b.end:''}</div><div class="muted">${[b.startTime,b.endTime].filter(Boolean).join(' - ')}</div><div>${b.note||''}</div></div>`).join(''):'<div class="card empty">Nog geen afwezigheid.</div>';}
document.addEventListener('click',function(e){
 const r=e.target.closest('.routeBtn');
 if(r){ e.preventDefault(); openNav(r.dataset.nav||''); return; }
 const f=e.target.closest('.finishBtn');
 if(f){ e.preventDefault(); openFinish(f.dataset.visit); return; }
});
$('menuBtn').onclick=()=>$('menuPanel').classList.toggle('open'); document.querySelectorAll('[data-screen]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(b.dataset.screen).classList.add('active'); document.querySelectorAll('#menuPanel button').forEach(x=>{x.classList.remove('active'); x.textContent=x.textContent.replace('👁️ ','')}); b.classList.add('active'); b.textContent='👁️ '+b.textContent.replace('👁️ ',''); $('menuPanel').classList.remove('open');});
$('prevWeek').onclick=()=>{weekOffset--;renderCalendar()}; $('nextWeek').onclick=()=>{weekOffset++;renderCalendar()}; $('search').oninput=renderOverview; document.querySelectorAll('.themeChoice').forEach(b=>b.onclick=()=>applyTheme(b.dataset.theme)); $('saveSettings').onclick=()=>{db.settings=db.settings||{}; db.settings.language=$('lang').value; if($('defaultSettings').checked){localStorage.setItem('gj_app_language',$('lang').value); localStorage.setItem('gj_theme',db.settings.theme||'blue')} saveDb(db); alert('Instellingen opgeslagen.')}; $('finishClose').onclick=closeFinish; $('btnDone').onclick=()=>finishVisit('Uitgevoerd'); $('btnNotDone').onclick=()=>finishVisit('Niet uitgevoerd'); $('finishOverlay').addEventListener('click',e=>{if(e.target.id==='finishOverlay')closeFinish()}); $('saveBlock').onclick=()=>{if(!$('blockStart').value)return alert('Vul startdatum in.'); db.blocks=db.blocks||[]; db.blocks.push({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),type:$('blockType').value,start:$('blockStart').value,end:$('blockEnd').value||$('blockStart').value,startTime:$('blockStartTime').value,endTime:$('blockEndTime').value,note:$('blockNote').value}); saveDb(db); render();};
window.addEventListener('load',()=>{applyTheme(); render(); ['blockStart','blockEnd'].forEach(id=>{if($(id)&&!$(id).value) $(id).value=todayIso();}); setTimeout(()=>$('splash').classList.add('hide'),850)});
</script>
</body></html>
